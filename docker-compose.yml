version: '3.8'

services:
  # Backend API Service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ecommerce-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/products', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ecommerce-client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ecommerce-network:
    driver: bridge

# Optional: Add volumes for persistent data (when using a real database)
# volumes:
#   db-data:
